version: "3.9"

# ─────────────────────────────────────────────────────────────
#  HackConnect – full production stack
#
#  Services:
#   db        PostgreSQL 15   (persistent volume)
#   app       Spring Boot     (2 replicas via --scale)
#   nginx     Reverse proxy   (load-balances app replicas)
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: hackconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hackconnect
      POSTGRES_USER:     hackconnect
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackconnect"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Spring Boot app ──────────────────────────────────────
  app:
    build: .
    image: hackconnect:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:        prod
      SPRING_DATASOURCE_URL:         jdbc:postgresql://db:5432/hackconnect
      SPRING_DATASOURCE_USERNAME:    hackconnect
      SPRING_DATASOURCE_PASSWORD:    ${DB_PASS:-changeme}
      APP_JWT_SECRET:                ${JWT_SECRET:-HackConnect-Change-This-Secret-Min32Chars!!}
      APP_JWT_EXPIRATION_MS:         ${JWT_EXPIRY_MS:-86400000}
      # Connection pool (HikariCP)
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:    20
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:          5
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:   30000
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:        600000
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend
      - frontend

  # ── Nginx reverse proxy / load balancer ─────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: hackconnect-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - frontend

volumes:
  pgdata:

networks:
  backend:
  frontend:
