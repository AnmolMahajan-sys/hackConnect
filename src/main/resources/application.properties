# ?? Server ???????????????????????????????????????????????????????????????????
server.port=8080
spring.application.name=HackConnect

# ?? H2 File Database ?????????????????????????????????????????????????????????
spring.datasource.url=jdbc:h2:file:./hackconnectdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? JPA ??????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# ?? Jackson ???????????????????????????????????????????????????????????????????
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ?? JWT ???????????????????????????????????????????????????????????????????????
app.jwt.expiration-ms=86400000
app.jwt.secret=${JWT_SECRET:not-set}

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.hackconnect=DEBUG
logging.level.org.springframework.security=WARN

# ?? AI Mentor ????????????????????????????????????????????????????????????????
spring.profiles.active=local

app.ai.gemini.api-key=${GEMINI_API_KEY:not-set}
app.ai.groq.api-key=${GROQ_API_KEY:not-set}
