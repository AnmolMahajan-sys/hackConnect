# ─────────────────────────────────────────────────────────────
#  Nginx – production config for HackConnect
#  Handles: HTTPS termination, HTTP→HTTPS redirect,
#           load-balancing across app replicas, rate-limiting
# ─────────────────────────────────────────────────────────────

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         application/json text/plain;
    gzip_min_length    1024;

    # ── Rate limiting (protect auth endpoints) ─────────────
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=200r/m;

    # ── Upstream – Docker Compose scales app horizontally ──
    upstream hackconnect_backend {
        least_conn;
        server app:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS certificates (use Let's Encrypt in production)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options    nosniff;
        add_header X-Frame-Options           DENY;
        add_header X-XSS-Protection          "1; mode=block";

        # ── Auth endpoints: strict rate limit ─────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass         http://hackconnect_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── All other API endpoints ────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass         http://hackconnect_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── Health check (used by load balancers) ─────────
        location /actuator/health {
            proxy_pass http://hackconnect_backend;
            access_log off;
        }

        # ── H2 console blocked in prod ────────────────────
        location /h2-console {
            return 403;
        }
    }
}
